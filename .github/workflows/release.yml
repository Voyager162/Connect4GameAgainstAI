name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    env:
      JAVAFX_VERSION: 22.0.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Resolve app version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME.Substring(1)
          } else {
            $version = "0.0.0"
          }

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download JavaFX jars
        shell: pwsh
        run: |
          $libDir = Join-Path $PWD "javafx-sdk\lib"
          New-Item -ItemType Directory -Force -Path $libDir | Out-Null

          $baseUrl = "https://repo1.maven.org/maven2/org/openjfx"
          $artifacts = @(
            "javafx-base",
            "javafx-graphics",
            "javafx-controls"
          )

          foreach ($artifact in $artifacts) {
            $fileName = "$artifact-$env:JAVAFX_VERSION-win.jar"
            $uri = "$baseUrl/$artifact/$env:JAVAFX_VERSION/$fileName"
            Invoke-WebRequest -Uri $uri -OutFile (Join-Path $libDir $fileName)
          }

          "JAVAFX_LIB=$libDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package Windows app
        shell: cmd
        run: package-app.bat

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: connect-four-fx-windows
          path: dist/*.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
